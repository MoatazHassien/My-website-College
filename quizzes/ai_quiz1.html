<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Quiz 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ستايل الزراير عشان تبقى زي الـ DS */
        .option-btn { border: 2px solid #dee2e6; margin-bottom: 10px; cursor: pointer; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 700px;">
            <div id="quiz-box">
                <h3 id="question-text"></h3>
                <div id="options-list" class="d-grid mt-4"></div>
                <div id="explanation-box" class="alert alert-info mt-4 d-none"></div>
                <button id="next-btn" class="btn btn-warning w-100 mt-3 d-none">Next Question</button>
            </div>
        </div>
    </div>

    <script>
        // --- (1) الجزء ده اللي بتغير فيه الأسئلة لكل مادة ---
        const quizData = [
            {
                q: "ما هو الـ Turing Test؟",
                options: ["اختبار سرعة المعالج", "اختبار محاكاة ذكاء البشر", "برنامج حماية"],
                correct: 1, // الاختيار التاني
                exp: "اختبار تورينج يقيس قدرة الآلة على التفكير كالبشر."
            }
        ];

        // --- (2) "السيستم" (الجافا سكريبت الثابتة) ---
        let currentIdx = 0;
        
        function showQuestion() {
            const data = quizData[currentIdx];
            document.getElementById('question-text').innerText = data.q;
            const list = document.getElementById('options-list');
            list.innerHTML = "";
            document.getElementById('explanation-box').classList.add('d-none');
            document.getElementById('next-btn').classList.add('d-none');

            data.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "btn option-btn text-start p-3 fw-bold";
                btn.innerText = opt;
                btn.onclick = () => check(i, btn);
                list.appendChild(btn);
            });
        }

        function check(chosenIdx, btn) {
            const data = quizData[currentIdx];
            const allBtns = document.querySelectorAll('.option-btn');
            
            if(chosenIdx === data.correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                allBtns[data.correct].classList.add('correct');
            }
            
            allBtns.forEach(b => b.disabled = true);
            document.getElementById('explanation-box').innerHTML = "<b>Explanation:</b> " + data.exp;
            document.getElementById('explanation-box').classList.remove('d-none');
            document.getElementById('next-btn').classList.remove('d-none');
        }

        showQuestion(); // تشغيل أول سؤال
    </script>
</body>
</html>
